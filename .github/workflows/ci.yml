name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"

jobs:
  # =================================================================
  # API: lint, typecheck, tests against a real Postgres+Timescale
  # =================================================================
  api:
    name: API (ruff / mypy / pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    services:
      postgres:
        image: timescale/timescaledb:2.17.2-pg16
        env:
          POSTGRES_USER: quant
          POSTGRES_PASSWORD: quant
          POSTGRES_DB: quant_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U quant"
          --health-interval=10s --health-timeout=5s --health-retries=5

      redis:
        image: redis:7.4-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: pip install uv==0.5.11

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format --check
        run: ruff format --check .

      - name: Mypy
        run: mypy src

      - name: Pytest
        env:
          APP_ENV: development
          JWT_SECRET_KEY: dev_ci_jwt_secret_key_not_for_production_use_only_testing_XXXXXX
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          POSTGRES_DB: quant_test
          POSTGRES_USER: quant
          POSTGRES_PASSWORD: quant
          DATABASE_URL: postgresql+asyncpg://quant:quant@localhost:5432/quant_test
          DATABASE_URL_SYNC: postgresql+psycopg://quant:quant@localhost:5432/quant_test
          REDIS_URL: redis://localhost:6379/0
          MINIO_ACCESS_KEY: dev
          MINIO_SECRET_KEY: dev_secret_key
          POLYGON_API_KEY: ci_placeholder
          ALPACA_API_KEY_ID: ci_placeholder
          ALPACA_API_SECRET_KEY: ci_placeholder
          FRED_API_KEY: ci_placeholder
          GROQ_API_KEY: ci_placeholder
          FINNHUB_API_KEY: ci_placeholder
          TIINGO_API_KEY: ci_placeholder
          MARKETAUX_API_KEY: ci_placeholder
        run: pytest -q --cov=quant --cov-report=xml

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: apps/api/coverage.xml
          if-no-files-found: ignore

  # =================================================================
  # WEB: lint, typecheck, build
  # =================================================================
  web:
    name: Web (eslint / tsc / build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build

  # =================================================================
  # Anti-fake-data guard: grep for forbidden literals
  # =================================================================
  no-fake-data:
    name: No fake data guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Grep for fake-data literals in production paths
        run: |
          set -e
          PATTERN='Math\.random|faker\.|lorem ipsum|mock_data|synthetic_data|fake_data|hardcoded_price'
          if grep -RInE "$PATTERN" apps/api/src apps/web/app apps/web/components apps/web/lib 2>/dev/null; then
            echo "::error::Forbidden fake-data literal found in production source."
            exit 1
          fi

  # =================================================================
  # Docker: smoke-build the API image
  # =================================================================
  docker:
    name: Docker build (api + web)
    runs-on: ubuntu-latest
    needs: [api, web]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/api
          push: false
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max
      # Sync the committed Oracle backtest artifact bundles into the web
      # build context. The Dockerfile's context is `./apps/web` only, so
      # without this step the static prerender of /results fails to find
      # report.json (the apps/api path is outside the context).
      - name: Sync Oracle artifacts into web context
        run: |
          set -e
          mkdir -p apps/web/.oracle-artifacts
          for run in sp500_momentum_126 sp500_momentum_126_pit sp500_momentum_126_2026 sp500_ml_predictions_v1 sp500_momentum_sweep; do
            src="apps/api/examples/backtest/artifacts/$run"
            if [ -d "$src" ]; then
              cp -R "$src" "apps/web/.oracle-artifacts/$run"
              echo "synced $run"
            else
              echo "::warning::missing artifact bundle $src — /results may fall back"
            fi
          done

      - name: Build Web image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/web
          push: false
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max
