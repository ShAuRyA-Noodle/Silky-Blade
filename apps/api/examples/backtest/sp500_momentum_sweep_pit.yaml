# Same 13-config grid as sp500_momentum_sweep.yaml but every run is
# evaluated on point-in-time S&P 500 membership (Wikipedia-sourced).
# Lets us measure whether selection bias is different under a properly
# survivorship-corrected universe — i.e. whether the configs that look
# best on the survivors-only data still look best when the joined-after
# forward bias is removed.
#
# Run:
#   python -m quant.cli backtest sweep examples/backtest/sp500_momentum_sweep_pit.yaml

name: sp500_momentum_sweep_pit
prices_csv: examples/backtest/sp500_5yr_adjusted.csv
start_date: 2014-01-02
end_date:   2018-02-07
output_dir: examples/backtest/artifacts

universe: sp500_pit

walk_forward_base:
  train_days: 252
  test_days: 21
  top_k: 25
  cost_bps: 5.0
  initial_capital: 100000.0

stats_base:
  sharpes_std: 0.5

n_slices: 8

runs:
  # Momentum lookback grid
  - name: mom_42
    signal: { kind: momentum, params: { lookback_days: 42 } }
  - name: mom_63
    signal: { kind: momentum, params: { lookback_days: 63 } }
  - name: mom_126
    signal: { kind: momentum, params: { lookback_days: 126 } }
  - name: mom_189
    signal: { kind: momentum, params: { lookback_days: 189 } }
  - name: mom_252
    signal: { kind: momentum, params: { lookback_days: 252 } }

  # Low-volatility anomaly
  - name: low_vol_63
    signal: { kind: low_vol, params: { lookback_days: 63 } }
  - name: low_vol_126
    signal: { kind: low_vol, params: { lookback_days: 126 } }
  - name: low_vol_252
    signal: { kind: low_vol, params: { lookback_days: 252 } }

  # Short-horizon mean reversion
  - name: mean_rev_5
    signal: { kind: mean_reversion, params: { lookback_days: 5 } }
  - name: mean_rev_10
    signal: { kind: mean_reversion, params: { lookback_days: 10 } }

  # Cross-knob momentum variants
  - name: mom_126_top10
    signal: { kind: momentum, params: { lookback_days: 126 } }
    walk_forward_overrides: { top_k: 10 }
  - name: mom_126_top50
    signal: { kind: momentum, params: { lookback_days: 126 } }
    walk_forward_overrides: { top_k: 50 }
  - name: mom_126_lowcost
    signal: { kind: momentum, params: { lookback_days: 126 } }
    walk_forward_overrides: { cost_bps: 1.0 }
