# Walk-forward momentum on the freshly-backfilled 2018-2026 Alpaca data.
# 8-year window covers two full bull/bear cycles + COVID + 2022 inflation.
#
# Run:  python -m quant.cli backtest run examples/backtest/sp500_momentum_2026.yaml

name: sp500_momentum_126_2026
prices_csv: ../../data/raw/alpaca_sp500_2018_2026.csv
start_date: 2019-01-02   # skip first year for warmup
end_date:   2026-05-01
output_dir: examples/backtest/artifacts

walk_forward:
  train_days: 252
  test_days: 21
  top_k: 25
  cost_bps: 5.0
  initial_capital: 100000.0

signal:
  kind: momentum
  params:
    lookback_days: 126

stats:
  n_trials: 1
  sharpes_std: 0.5
