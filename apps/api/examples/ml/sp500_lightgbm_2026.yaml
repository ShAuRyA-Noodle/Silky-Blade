# Train LightGBM on the full 2018-2026 Alpaca-sourced S&P 500 panel.
# 8 years × ~503 names = a meaningfully bigger panel than the 5y Kaggle
# demo (28k rows × 100 syms → ~700k rows × 200 syms here).

name: sp500_lightgbm_2026
output_dir: examples/ml/artifacts

data:
  prices_csv: ../../data/raw/alpaca_sp500_2018_2026.csv
  start_date: 2018-01-02
  end_date:   2026-05-01
  # Larger sample so the model sees more variety; still memory-bounded.
  max_symbols: 200
  symbol_seed: 42

label:
  horizon: 5
  pt_sigma: 2.0
  sl_sigma: 2.0
  vol_window: 21

cv:
  n_splits: 5
  embargo_frac: 0.01

model:
  num_boost_round: 200
  early_stopping_rounds: 30
  params:
    objective: multiclass
    num_class: 3
    metric: multi_logloss
    learning_rate: 0.05
    num_leaves: 31
    min_data_in_leaf: 50
    feature_fraction: 0.8
    bagging_fraction: 0.8
    bagging_freq: 5
    lambda_l1: 0.1
    lambda_l2: 0.1
    deterministic: true
    seed: 42
    verbose: -1
